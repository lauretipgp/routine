<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
</head><body>
<div id="out" style="font-family:monospace;padding:20px;background:#0d1b2a;color:#c8dff2;min-height:100vh">
  Initialisation...
</div>
<script>
function log(msg) {
  document.getElementById('out').innerHTML += '<br>' + msg;
}

log('Script démarré');

grist.ready({ requiredAccess: 'full' });
log('grist.ready() appelé');

grist.onRecords(function(records) {
  log('✓ onRecords déclenché — ' + records.length + ' enregistrements');
  log('Premier: ' + JSON.stringify(records[0]).slice(0,100));
});

log('grist.onRecords() enregistré');
</script>
</body></html>
